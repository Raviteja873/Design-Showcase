<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Design Showcase</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <main class="container">
        <div class="login-box">
            <h2 style="text-align: center;">Admin Access</h2>
            <div id="loginError" style="color: #ef4444; margin-bottom: var(--space-2); text-align: center; display: none;"></div>
            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" name="username" class="form-input" autocomplete="off" required>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-input" autocomplete="new-password" required>
                </div>
                <button type="submit" class="btn" style="width: 100%; margin-bottom: var(--space-2);">Login</button>
            </form>
            <a href="/" class="btn btn-secondary" style="width: 100%; text-align: center; display: block; box-sizing: border-box;">Back to Home</a>
        </div>
    </main>
    <script src="/js/admin.js"></script>
</body>
</html>
