<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Design Showcase</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body style="display: none;">
    <header class="admin-header">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <a href="/admin.html" class="logo">Admin Dashboard</a>
            <nav>
                <button id="logoutBtn" class="btn btn-secondary">Logout</button>
                <a href="/" target="_blank" class="btn btn-secondary">View Site</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section>
            <h2>Manage Designs</h2>
            <button id="addNewBtn" class="btn" style="margin-bottom: var(--space-3)">+ Add New Design</button>

            <div id="designFormContainer" class="card"
                style="padding: var(--space-4); margin-bottom: var(--space-4); display: none;">
                <h3 id="formTitle">Add New Design</h3>

                <form id="designForm">
                    <input type="hidden" id="designId">

                    <input type="text" id="title" placeholder="Title" required>

                    <select id="category">
                        <option value="">Select category</option>
                        <option value="Web Design">Web Design</option>
                        <option value="UI/UX">UI/UX</option>
                        <option value="Branding">Branding</option>
                    </select>

                    <textarea id="description" placeholder="Description" required></textarea>

                    <!-- ✅ FIXED -->
                    <input type="file" id="image" name="image">

                    <button type="submit">Save Design</button>
                    <button type="button" id="cancelBtn">Cancel</button>
                </form>
            </div>

            <div id="adminDesignList"></div>
        </section>
    </main>

    <script src="/js/admin.js"></script>
</body>
</html>
