<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Design Showcase</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body style="display: none;"> <!-- Hidden until auth checks -->
    <header class="admin-header">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <a href="/admin.html" class="logo">Admin Dashboard</a>
            <nav>
                <button id="logoutBtn" class="btn btn-secondary">Logout</button>
                <a href="/" target="_blank" class="btn btn-secondary">View Site</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section>
            <h2>Manage Designs</h2>
            <button id="addNewBtn" class="btn" style="margin-bottom: var(--space-3)">+ Add New Design</button>

            <!-- Form for Add/Edit -->
            <div id="designFormContainer" class="card"
                style="padding: var(--space-4); margin-bottom: var(--space-4); display: none;">
                <h3 id="formTitle">Add New Design</h3>
                <form id="designForm">
                    <input type="hidden" id="designId">
                    <div class="form-group">
                        <label for="title" class="form-label">Title</label>
                        <input type="text" id="title" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label for="category" class="form-label">Category</label>
                        <select id="category" class="form-input">
                            <option value="">Select a category</option>
                            <option value="Web Design">Web Design</option>
                            <option value="UI/UX">UI/UX</option>
                            <option value="Branding">Branding</option>
                            <option value="Illustration">Illustration</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="description" class="form-label">Description</label>
                        <textarea id="description" class="form-textarea" rows="4" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="image" class="form-label">File Upload (PNG, JPG, SVG, PDF)</label>
                        <input type="file" id="image" class="form-input" accept=".png,.jpg,.jpeg,.svg,.pdf">
                        <small id="imageHelp" style="color: var(--text-secondary);"></small>
                    </div>
                    <div style="display: flex; gap: var(--space-2);">
                        <button type="submit" class="btn">Save Design</button>
                        <button type="button" id="cancelBtn" class="btn btn-secondary">Cancel</button>
                    </div>
                </form>
            </div>

            <!-- List of existing designs -->
            <div id="adminDesignList" class="admin-list">
                <!-- Populated by JS -->
                <p>Loading designs...</p>
            </div>
        </section>
    </main>

    <script src="/js/admin.js"></script>
    <script>
        // Init dashboard specific logic
        document.addEventListener('DOMContentLoaded', () => {
            if (window.location.pathname.endsWith('admin.html')) {
                initAdminDashboard();
            }
        });
    </script>
</body>

</html>
